version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - tinyagi-net

  tinyagi:
    build:
      context: .
      dockerfile: docker/Dockerfile
      network: host
    container_name: tinyagi
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./config/settings.json:/root/.tinyagi/settings.json
      - tinyagi-data:/root/workspace
    ports:
      - "${TINYAGI_PORT:-8090}:3777"
    networks:
      - tinyagi-net
    depends_on:
      - ollama

networks:
  tinyagi-net:
    driver: bridge

volumes:
  ollama-data:
  tinyagi-data:
