version: "3.9"

services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama
    restart: unless-stopped
    volumes:
      - ollama-data:/root/.ollama
    networks:
      - tinyagi-net

  tinyagi:
    build:
      context: .
      dockerfile: docker/Dockerfile
    container_name: tinyagi
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
      - ./config:/app/config
    ports:
      - "${TINYAGI_PORT:-8090}:8090"
    networks:
      - tinyagi-net
    depends_on:
      - ollama

networks:
  tinyagi-net:
    driver: bridge

volumes:
  ollama-data:
