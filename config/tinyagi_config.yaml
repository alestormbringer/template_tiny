agent:
  name: tinyagi
  max_iterations: 10
  verbose: true

llm:
  provider: openai          # Ollama exposes an OpenAI-compatible endpoint
  model: llama3.1:8b
  temperature: 0.7
  max_tokens: 2048
  base_url: http://ollama:11434/v1
  api_key: ollama           # valore ignorato da Ollama, richiesto dal client

server:
  host: 0.0.0.0
  port: 8090

logging:
  level: INFO
  file: logs/tinyagi.log
