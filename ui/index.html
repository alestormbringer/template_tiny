<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TINYAGI // CONTROL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  background:#04010e;
  background-image:
    radial-gradient(ellipse at 15% 50%,rgba(50,0,140,.5) 0%,transparent 50%),
    radial-gradient(ellipse at 85% 20%,rgba(0,50,140,.4) 0%,transparent 45%),
    radial-gradient(ellipse at 55% 85%,rgba(80,0,100,.35) 0%,transparent 40%);
  color:#4a6080;font-family:'Courier New',monospace;font-size:12px;
  height:100vh;overflow:hidden;display:flex;flex-direction:column;
}
#stars{position:fixed;inset:0;pointer-events:none;z-index:0}
header{
  position:relative;z-index:10;height:40px;flex-shrink:0;
  background:rgba(2,1,18,.95);border-bottom:1px solid rgba(80,100,255,.15);
  display:flex;align-items:center;padding:0 12px;
  box-shadow:0 2px 30px rgba(60,0,180,.2);
}
.logo{font-size:13px;letter-spacing:5px;color:#00c8ff;text-shadow:0 0 20px #00c8ff,0 0 50px rgba(0,200,255,.3);margin-right:16px;white-space:nowrap}
.hm{display:flex;flex-direction:column;padding:0 11px;height:100%;justify-content:center;border-right:1px solid rgba(255,255,255,.05)}
.hm-l{font-size:8px;opacity:.3;letter-spacing:1px;text-transform:uppercase;margin-bottom:1px}
.hm-v{font-size:13px;font-weight:bold}
.c-cy{color:#00c8ff;text-shadow:0 0 12px #00c8ff}
.c-gn{color:#00ff88;text-shadow:0 0 12px #00ff88}
.c-or{color:#ff8800;text-shadow:0 0 12px #ff8800}
.c-pu{color:#cc66ff;text-shadow:0 0 12px #cc66ff}
.c-wh{color:#c0d8f0}
.dot{display:inline-block;width:6px;height:6px;border-radius:50%;background:#00ff88;box-shadow:0 0 10px #00ff88,0 0 24px rgba(0,255,136,.4);margin-right:4px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.15}}
.hm-r{margin-left:auto;display:flex;align-items:center;gap:10px;padding-left:12px;border-left:1px solid rgba(255,255,255,.05)}
#clock{color:#00c8ff;font-size:11px;letter-spacing:1px}
#rtag{color:rgba(0,200,255,.22);font-size:9px}
main{position:relative;z-index:5;flex:1;overflow:hidden;padding:8px;display:flex;flex-direction:column;gap:6px}
.grid{flex:1;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(2,1fr);gap:8px;position:relative}

/* PANEL */
.panel{
  border:1px solid var(--pc);border-radius:3px;
  display:flex;flex-direction:column;overflow:hidden;position:relative;
  box-shadow:0 0 24px rgba(var(--pr),.4),0 0 80px rgba(var(--pr),.12),inset 0 0 0 1px rgba(var(--pr),.08);
  cursor:pointer;transition:box-shadow .25s;
  background:#000;
}
.panel:hover{box-shadow:0 0 40px rgba(var(--pr),.65),0 0 120px rgba(var(--pr),.2),inset 0 0 0 1px rgba(var(--pr),.15)}
.panel::before,.panel::after,.c-bl,.c-br{content:'';position:absolute;width:12px;height:12px;border-color:var(--pc);border-style:solid;z-index:20;box-shadow:0 0 8px var(--pc)}
.panel::before{top:-1px;left:-1px;border-width:2px 0 0 2px}
.panel::after{top:-1px;right:-1px;border-width:2px 2px 0 0}
.c-bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px}
.c-br{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
.ph{display:flex;align-items:center;justify-content:space-between;padding:5px 9px;flex-shrink:0;border-bottom:1px solid rgba(var(--pr),.2);background:rgba(var(--pr),.1);z-index:10;position:relative}
.ph-id{font-size:10px;color:var(--pc);letter-spacing:2px;text-shadow:0 0 10px var(--pc)}
.ph-st{display:flex;align-items:center;gap:4px;font-size:9px;color:var(--pc)}
.ph-dot{width:5px;height:5px;border-radius:50%;background:var(--pc);box-shadow:0 0 8px var(--pc)}
.ph-dot.busy{animation:blink .5s infinite}
.viz{flex:1;position:relative;overflow:hidden}
.viz canvas{position:absolute;inset:0;width:100%;height:100%}
.xpbar{height:2px;background:rgba(var(--pr),.12);flex-shrink:0;z-index:10}
.xpfill{height:100%;background:var(--pc);box-shadow:0 0 6px var(--pc);transition:width .8s}
.pf{padding:4px 9px;flex-shrink:0;border-top:1px solid rgba(var(--pr),.12);display:flex;justify-content:space-between;align-items:center;z-index:10;position:relative;background:rgba(var(--pr),.05)}
.pf-name{font-size:10px;color:#8ab0d0}
.pf-task{font-size:9px;color:var(--pc);opacity:.45;max-width:55%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.panel.busy .viz::after{content:'';position:absolute;left:0;right:0;height:2px;background:rgba(var(--pr),.6);box-shadow:0 0 12px var(--pc),0 0 4px var(--pc);animation:scan 1.8s linear infinite;pointer-events:none;z-index:15}
@keyframes scan{from{top:-2px}to{top:calc(100% + 2px)}}

/* THEMES */
.t-cy{--pc:#00c8ff;--pr:0,200,255}
.t-or{--pc:#ff8800;--pr:255,136,0}
.t-gn{--pc:#00ff88;--pr:0,255,136}
.t-yw{--pc:#ffdd00;--pr:255,221,0}
.t-pu{--pc:#cc66ff;--pr:180,80,255}
.t-pk{--pc:#ff44cc;--pr:255,68,180}
.t-rd{--pc:#ff4422;--pr:255,68,34}
.t-tl{--pc:#00ddcc;--pr:0,220,200}

/* LOG */
.log-term{position:absolute;bottom:0;left:0;width:260px;height:148px;background:rgba(0,2,15,.88);border:1px solid rgba(0,200,255,.18);border-radius:3px;z-index:30;display:flex;flex-direction:column;overflow:hidden;backdrop-filter:blur(10px);box-shadow:0 0 20px rgba(0,80,200,.2)}
.log-hdr{padding:4px 8px;border-bottom:1px solid rgba(0,200,255,.1);font-size:9px;color:rgba(0,200,255,.4);letter-spacing:1px;display:flex;justify-content:space-between;flex-shrink:0}
.log-body{flex:1;overflow:hidden;padding:4px 8px;display:flex;flex-direction:column-reverse;gap:1px}
.ll{font-size:9px;line-height:1.55;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ll .lt{color:rgba(0,200,255,.28)}
.ll .la{color:rgba(0,200,255,.5);margin:0 3px}
.ll .lm{color:rgba(180,210,255,.35)}
.ll .lm.ok{color:rgba(0,255,136,.5)}
.ll .lm.err{color:rgba(255,80,40,.6)}

.bbar{flex-shrink:0;height:27px;display:flex;align-items:center;justify-content:center;gap:3px;border-top:1px solid rgba(255,255,255,.04)}
.bb{padding:3px 13px;border:1px solid transparent;background:transparent;color:#2a4060;font-family:monospace;font-size:10px;letter-spacing:1px;cursor:pointer;border-radius:2px;transition:all .15s}
.bb:hover,.bb.on{border-color:rgba(0,200,255,.28);background:rgba(0,200,255,.05);color:#00c8ff;text-shadow:0 0 8px #00c8ff}
</style>
</head>
<body>
<canvas id="stars"></canvas>
<header>
  <div class="logo">◈ TINYAGI</div>
  <div class="hm"><span class="hm-l">Revenue</span><span class="hm-v c-gn" id="h-rev">$0.00</span></div>
  <div class="hm"><span class="hm-l">Orders</span><span class="hm-v c-wh" id="h-ord">0</span></div>
  <div class="hm"><span class="hm-l">Products</span><span class="hm-v c-or" id="h-prd">0 LIVE</span></div>
  <div class="hm"><span class="hm-l">Agents</span><span class="hm-v c-cy" id="h-ag">0/8</span></div>
  <div class="hm"><span class="hm-l">Tasks</span><span class="hm-v c-pu" id="h-tasks">0</span></div>
  <div class="hm"><span class="hm-l">Status</span><span class="hm-v c-gn"><span class="dot"></span>ONLINE</span></div>
  <div class="hm-r"><span style="color:#2a4060;font-size:9px">DAY <span id="hday">1</span></span><span id="clock">00:00:00</span><span id="rtag">↻5s</span></div>
</header>
<main>
  <div class="grid" id="grid">
    <div class="log-term" id="log-term">
      <div class="log-hdr"><span>◈ AGENT LOG</span><span id="log-ct">live</span></div>
      <div class="log-body" id="log-body"></div>
    </div>
  </div>
  <div class="bbar">
    <button class="bb on">◈ HUB</button>
    <button class="bb">◎ PIPELINE</button>
    <button class="bb">⚔ AGENTS</button>
    <button class="bb">◐ ANALYTICS</button>
    <button class="bb">▲ PUBLISH</button>
    <button class="bb">⚙ SETTINGS</button>
  </div>
</main>
<script>
// ── Stars ─────────────────────────────────────────────────────────────────────
(function(){
  const c=document.getElementById('stars'),x=c.getContext('2d');
  c.width=innerWidth;c.height=innerHeight;
  const S=Array.from({length:250},()=>({x:Math.random()*c.width,y:Math.random()*c.height,r:Math.random()*.9+.1,a:Math.random()*.5+.05,s:Math.random()*.003+.001,t:Math.random()*6.28}));
  !function f(){x.clearRect(0,0,c.width,c.height);S.forEach(s=>{s.t+=s.s;x.beginPath();x.arc(s.x,s.y,s.r,0,6.28);x.fillStyle=`rgba(160,200,255,${s.a*(.5+.5*Math.sin(s.t))})`;x.fill()});requestAnimationFrame(f)}();
  onresize=()=>{c.width=innerWidth;c.height=innerHeight};
})();

// ── Meta ──────────────────────────────────────────────────────────────────────
const META={
  'tinyagi':         {label:'NEXUS',     th:'t-cy',viz:'radar'},
  'market-analyst':  {label:'MARKET',    th:'t-or',viz:'market'},
  'notion-creator':  {label:'DOC FORGE', th:'t-gn',viz:'doc'},
  'finance-creator': {label:'FINANCE',   th:'t-yw',viz:'finance'},
  'business-creator':{label:'STRATEGY',  th:'t-pu',viz:'nodes'},
  'copywriter':      {label:'CONTENT',   th:'t-pk',viz:'copy'},
  'publisher':       {label:'PUBLISH',   th:'t-rd',viz:'publish'},
  'analytics':       {label:'ANALYTICS', th:'t-tl',viz:'rings'},
};
const COL={'t-cy':'#00c8ff','t-or':'#ff8800','t-gn':'#00ff88','t-yw':'#ffdd00','t-pu':'#cc66ff','t-pk':'#ff44cc','t-rd':'#ff4422','t-tl':'#00ddcc'};
const h2r=h=>[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)];
const rc=(c,a)=>{const[r,g,b]=h2r(c);return`rgba(${r},${g},${b},${a})`};
const gl=(g,c,b=16)=>{g.shadowColor=c;g.shadowBlur=b};
const ng=g=>{g.shadowBlur=0};

// ══════════════════════════════════════════════════════════════════════════════
// ROOM VISUALIZATIONS — each fills the entire panel interior
// ══════════════════════════════════════════════════════════════════════════════

// ── NEXUS: Radar command center ───────────────────────────────────────────────
function vizRadar(g,W,H,C,t){
  const cx=W/2,cy=H/2,R=Math.min(W,H)*.46;
  // background ambient
  const bg=g.createRadialGradient(cx,cy,0,cx,cy,R*1.2);
  bg.addColorStop(0,rc(C,.12));bg.addColorStop(.5,rc(C,.04));bg.addColorStop(1,'transparent');
  g.fillStyle=bg;g.fillRect(0,0,W,H);
  // hex grid background
  const hs=18;
  for(let row=-1;row<H/hs+2;row++){for(let col=-1;col<W/hs+2;col++){
    const hx=col*hs*1.5,hy=row*hs*Math.sqrt(3)+(col%2)*hs*.87;
    g.beginPath();for(let i=0;i<6;i++){const a=i*Math.PI/3,nx=hx+hs*.45*Math.cos(a),ny=hy+hs*.45*Math.sin(a);i?g.lineTo(nx,ny):g.moveTo(nx,ny)}
    g.closePath();g.strokeStyle=rc(C,.03+.02*Math.max(0,1-Math.hypot(hx-cx,hy-cy)/R));g.lineWidth=.5;g.stroke();
  }}
  // concentric rings (many)
  for(let i=1;i<=8;i++){const r=R*i/8;g.beginPath();g.arc(cx,cy,r,0,Math.PI*2);g.strokeStyle=rc(C,.06+i*.012);g.lineWidth=i===4||i===8?.9:.45;g.stroke()}
  // radial spokes
  for(let i=0;i<12;i++){const a=i*Math.PI/6;g.beginPath();g.moveTo(cx,cy);g.lineTo(cx+Math.cos(a)*R,cy+Math.sin(a)*R);g.strokeStyle=rc(C,.05);g.lineWidth=.4;g.stroke()}
  // outer dashed ring
  g.save();g.setLineDash([5,8]);g.beginPath();g.arc(cx,cy,R+6,0,Math.PI*2);g.strokeStyle=rc(C,.18);g.lineWidth=1;g.stroke();g.restore();
  // SWEEP — wide glowing sector
  const sw=t*1.3;
  g.save();g.translate(cx,cy);g.rotate(sw);
  for(let i=0;i<40;i++){const a=-i*.06,alpha=.5-i*.012;if(alpha<=0)break;g.beginPath();g.moveTo(0,0);g.arc(0,0,R,a-.04,a+.04);g.fillStyle=rc(C,alpha);g.fill()}
  g.restore();
  // sweep leading edge
  g.save();g.translate(cx,cy);g.rotate(sw);
  gl(g,C,20);g.beginPath();g.moveTo(0,0);g.lineTo(R,0);g.strokeStyle=C;g.lineWidth=2;g.stroke();ng(g);
  g.restore();
  // blips with echo rings
  const blips=[{r:.82,a:.8,s:1},{r:.51,a:2.2,s:.8},{r:.68,a:4.1,s:.9},{r:.35,a:5.5,s:.7},{r:.92,a:3.3,s:.6}];
  blips.forEach(b=>{
    const bx=cx+Math.cos(b.a)*R*b.r,by=cy+Math.sin(b.a)*R*b.r;
    const swept=((sw%(Math.PI*2))-(b.a%(Math.PI*2))+Math.PI*4)%(Math.PI*2);
    const fade=Math.max(0,1-swept/(Math.PI*1.8));
    if(fade>.02){
      // echo
      g.beginPath();g.arc(bx,by,6*fade,0,Math.PI*2);g.strokeStyle=rc(C,fade*.5);g.lineWidth=1;g.stroke();
      // core
      gl(g,C,10);g.beginPath();g.arc(bx,by,2.5,0,Math.PI*2);g.fillStyle=rc(C,.3+fade*.7);g.fill();ng(g);
    }
  });
  // center hub
  for(let i=3;i>=1;i--){g.beginPath();g.arc(cx,cy,i*3.5,0,Math.PI*2);gl(g,C,i*8);g.fillStyle=rc(C,.2*i);g.fill()}
  gl(g,C,24);g.beginPath();g.arc(cx,cy,3.5,0,Math.PI*2);g.fillStyle=C;g.fill();ng(g);
  // range labels
  g.font=`7px 'Courier New'`;g.fillStyle=rc(C,.3);g.textAlign='center';
  [.25,.5,.75,1].forEach(f=>g.fillText(Math.round(f*100)+'km',cx+R*f,cy-3));
  g.textAlign='left';
}

// ── MARKET: Multi-layer trading terminal ──────────────────────────────────────
function vizMarket(g,W,H,C,t){
  const p=10;
  // ambient bg
  const bg=g.createLinearGradient(0,0,0,H);bg.addColorStop(0,rc(C,.04));bg.addColorStop(1,rc(C,.01));
  g.fillStyle=bg;g.fillRect(0,0,W,H);
  // horizontal grid
  for(let i=0;i<=5;i++){const y=p+i*(H-p*2)/5;g.beginPath();g.moveTo(p,y);g.lineTo(W-p,y);g.strokeStyle=rc(C,.06);g.lineWidth=.5;g.stroke();g.fillStyle=rc(C,.2);g.font='7px monospace';g.textAlign='right';g.fillText('$'+(120-i*20),W-p-1,y-2)}
  g.textAlign='left';
  // candlestick bars (background layer)
  const nbars=16,bw=(W-p*2)/nbars;
  for(let i=0;i<nbars;i++){
    const open=.35+Math.sin(i*.9)*0.25+Math.sin(i*.4+1)*0.15;
    const close=open+(.1-Math.random()*.2);
    const hi=Math.max(open,close)+Math.abs(Math.sin(i*1.3))*.08;
    const lo=Math.min(open,close)-Math.abs(Math.sin(i*.7))*.06;
    const x=p+i*bw+bw*.15,ch=H-p*2;
    const bull=close>=open;
    const cc=bull?C:'#ff4422';
    // wick
    g.strokeStyle=rc(cc,.35);g.lineWidth=.8;
    g.beginPath();g.moveTo(x+bw*.35,H-p-hi*ch);g.lineTo(x+bw*.35,H-p-lo*ch);g.stroke();
    // body
    const y1=H-p-Math.max(open,close)*ch,bh=Math.abs(close-open)*ch||2;
    g.fillStyle=rc(cc,.28+.1*bull);g.fillRect(x,y1,bw*.7,bh||2);
  }
  // main price wave
  g.beginPath();
  for(let x=0;x<W-p*2;x+=1.5){
    const v=Math.sin(x*.028+t*.9)*.28+Math.sin(x*.014+t*.5)*.18+Math.sin(x*.055+t*1.8)*.08;
    const y=H*.5+v*(H*.35);
    x===0?g.moveTo(p+x,y):g.lineTo(p+x,y);
  }
  gl(g,C,14);g.strokeStyle=rc(C,.9);g.lineWidth=2;g.stroke();ng(g);
  // fill under
  g.lineTo(W-p,H);g.lineTo(p,H);g.fillStyle=rc(C,.07);g.fill();
  // secondary wave
  g.beginPath();
  for(let x=0;x<W-p*2;x+=2){
    const v=Math.sin(x*.018+t*.6)*.18+Math.sin(x*.04+t*1.2)*.1;
    const y=H*.62+v*(H*.25);
    x===0?g.moveTo(p+x,y):g.lineTo(p+x,y);
  }
  g.strokeStyle=rc(C,.3);g.lineWidth=1;g.stroke();
  // moving cursor dot
  const dx=((t*28)%(W-p*2)),dv=Math.sin(dx*.028+t*.9)*.28+Math.sin(dx*.014+t*.5)*.18;
  const dy=H*.5+dv*(H*.35);
  gl(g,C,20);g.beginPath();g.arc(p+dx,dy,4,0,Math.PI*2);g.fillStyle=C;g.fill();ng(g);
  // crosshair
  g.strokeStyle=rc(C,.2);g.lineWidth=.5;g.setLineDash([3,4]);
  g.beginPath();g.moveTo(p+dx,0);g.lineTo(p+dx,H);g.stroke();
  g.beginPath();g.moveTo(0,dy);g.lineTo(W,dy);g.stroke();
  g.setLineDash([]);
  // price tag
  const price=Math.round(80+dv*100);
  g.fillStyle=C;g.font='bold 9px monospace';g.fillText('$'+price,p+dx+5,dy-4);
}

// ── DOC FORGE: Living document ────────────────────────────────────────────────
function vizDoc(g,W,H,C,t){
  const p=8;
  // page background
  g.fillStyle=rc(C,.03);g.fillRect(p,p,W-p*2,H-p*2);
  g.strokeStyle=rc(C,.14);g.lineWidth=.6;g.strokeRect(p,p,W-p*2,H-p*2);
  // margin line
  g.strokeStyle=rc(C,.08);g.lineWidth=.5;g.beginPath();g.moveTo(p+16,p);g.lineTo(p+16,H-p);g.stroke();
  // scrolling text lines
  const lh=10.5,off=(t*8)%lh;
  const rows=[
    {w:.88,type:'h'},{w:.0,type:'sp'},{w:.72,type:'b'},{w:.55,type:'n'},{w:.80,type:'n'},{w:.48,type:'n'},
    {w:.0,type:'sp'},{w:.65,type:'h2'},{w:.0,type:'sp'},{w:.78,type:'n'},{w:.60,type:'n'},{w:.82,type:'n'},{w:.44,type:'n'},
    {w:.75,type:'n'},{w:.0,type:'sp'},{w:.90,type:'h'},{w:.0,type:'sp'},{w:.58,type:'n'},{w:.70,type:'n'},{w:.42,type:'n'},
  ];
  rows.forEach((r,i)=>{
    const y=p+4+i*lh-off;
    if(y<p+1||y>H-p+lh)return;
    if(r.type==='sp')return;
    const lx=p+18,lw=(W-p*2-20)*r.w;
    if(r.type==='h'){
      gl(g,C,8);g.fillStyle=C;g.fillRect(lx,y-7,lw*.4,8);
      g.fillStyle=rc(C,.5);g.fillRect(lx+lw*.4+2,y-7,lw*.3,8);ng(g);
    } else if(r.type==='h2'){
      g.fillStyle=rc(C,.45);g.fillRect(lx,y-6,lw*.55,6);
    } else {
      // text line
      g.beginPath();g.moveTo(lx,y);g.lineTo(lx+lw,y);
      g.strokeStyle=rc(C,.25);g.lineWidth=.8;g.stroke();
      // occasional highlighted word
      if(i%4===0){const hw=lw*.2;g.fillStyle=rc(C,.12);g.fillRect(lx+lw*.3,y-6,hw,8)}
    }
  });
  // blinking cursor
  const crow=Math.floor(t*.8)%rows.length;
  const cy=p+4+crow*lh-off+(lh*.5);
  if(cy>p&&cy<H-p&&Math.sin(t*4)>0){gl(g,C,10);g.fillStyle=C;g.fillRect(p+18+(W-p*2-20)*(rows[crow]?.w||.5)+2,cy-8,1.5,10);ng(g)}
  // page number
  g.font='7px monospace';g.fillStyle=rc(C,.2);g.textAlign='center';
  g.fillText('— '+(Math.floor(t*.2)%12+1)+' —',W/2,H-p-2);g.textAlign='left';
}

// ── FINANCE: Full-coverage chart terminal ─────────────────────────────────────
function vizFinance(g,W,H,C,t){
  const p=10;
  // ambient
  g.fillStyle=rc(C,.03);g.fillRect(0,0,W,H);
  // grid
  for(let i=0;i<=6;i++){const y=p+i*(H-p*2)/6;g.beginPath();g.moveTo(p,y);g.lineTo(W-p,y);g.strokeStyle=rc(C,.06);g.lineWidth=.5;g.stroke()}
  for(let i=0;i<=6;i++){const x=p+i*(W-p*2)/6;g.beginPath();g.moveTo(x,p);g.lineTo(x,H-p);g.strokeStyle=rc(C,.04);g.lineWidth=.4;g.stroke()}
  // bars (many, with glow on top)
  const n=14,bw=(W-p*2)/n;
  const GR=g.createLinearGradient(0,H,0,p);
  GR.addColorStop(0,rc(C,.88));GR.addColorStop(.6,rc(C,.5));GR.addColorStop(1,rc(C,.18));
  for(let i=0;i<n;i++){
    const h=(Math.sin(i*.55+t*.4)*.32+.6+Math.sin(i*1.1+t*.25)*.15)*(H-p*2-2);
    const x=p+i*bw+1.5,y=H-p-h;
    g.fillStyle=rc(C,.06);g.fillRect(x,p,bw-3,H-p*2-2);
    g.fillStyle=GR;g.fillRect(x,y,bw-3,h);
    gl(g,C,8);g.fillStyle=C;g.fillRect(x,y,bw-3,2.5);ng(g);
  }
  // two trend lines
  [[.5,1.6,.42,1.1],[.3,.9,.28,1.4]].forEach(([a1,s1,a2,s2],li)=>{
    g.beginPath();
    for(let i=0;i<n;i++){
      const h=(Math.sin(i*.55+t*.4)*.32+.6+Math.sin(i*1.1+t*.25)*.15)*(H-p*2-2);
      g.lineTo(p+i*bw+bw/2,H-p-h);
    }
    g.strokeStyle=rc(C,li===0?.5:.2);g.lineWidth=li===0?1.4:.7;g.setLineDash(li===0?[]:[4,5]);g.stroke();g.setLineDash([]);
  });
  // mini sparkline top-right
  const sw=W*.3,sh=H*.22,sx=W-p-sw,sy=p+4;
  g.fillStyle=rc(C,.06);g.fillRect(sx,sy,sw,sh);
  g.strokeStyle=rc(C,.1);g.lineWidth=.5;g.strokeRect(sx,sy,sw,sh);
  g.beginPath();
  for(let x=0;x<=sw;x+=2){const v=Math.sin(x*.08+t*1.5)*.4+Math.sin(x*.03+t*.8)*.3;g.lineTo(sx+x,sy+sh/2+v*sh*.4)}
  gl(g,C,6);g.strokeStyle=rc(C,.7);g.lineWidth=1;g.stroke();ng(g);
  // axis labels
  g.font='7px monospace';g.fillStyle=rc(C,.3);g.textAlign='right';
  ['$40','$30','$20','$10'].forEach((v,i)=>g.fillText(v,p+10,p+i*(H-p*2)/3.5+10));
  g.textAlign='left';
}

// ── STRATEGY: Dense neural network ───────────────────────────────────────────
function vizNodes(g,W,H,C,t){
  // ambient
  const bg=g.createRadialGradient(W/2,H/2,0,W/2,H/2,Math.max(W,H)*.7);
  bg.addColorStop(0,rc(C,.1));bg.addColorStop(1,'transparent');
  g.fillStyle=bg;g.fillRect(0,0,W,H);
  // nodes — 15, distributed across full canvas
  const N=[
    {x:.5,y:.15},{x:.15,y:.35},{x:.85,y:.3},{x:.5,y:.42},
    {x:.25,y:.6},{x:.75,y:.58},{x:.1,y:.7},{x:.9,y:.65},
    {x:.4,y:.78},{x:.62,y:.82},{x:.5,y:.95},{x:.22,y:.18},
    {x:.78,y:.18},{x:.35,y:.5},{x:.65,y:.45}
  ];
  const E=[
    [0,1],[0,2],[0,3],[1,3],[2,3],[3,4],[3,5],[3,13],[3,14],
    [1,4],[2,5],[4,6],[5,7],[4,8],[5,9],[8,10],[9,10],
    [0,11],[0,12],[11,1],[12,2],[13,4],[14,5],[6,8],[7,9],
    [1,13],[2,14],[11,12],[4,13],[5,14]
  ];
  const pts=N.map(n=>({x:n.x*W,y:n.y*H}));
  // draw edges with animated packets
  E.forEach(([a,b],ei)=>{
    const p1=pts[a],p2=pts[b];
    const pulse=Math.sin(t*1.4+a*.6+b*.4)*.5+.5;
    // edge glow
    g.beginPath();g.moveTo(p1.x,p1.y);g.lineTo(p2.x,p2.y);
    gl(g,C,3*pulse);g.strokeStyle=rc(C,.04+pulse*.14);g.lineWidth=.6+pulse*.3;g.stroke();ng(g);
    // data packet
    const pf=((t*.6+ei*.13))%1;
    const px=p1.x+(p2.x-p1.x)*pf,py=p1.y+(p2.y-p1.y)*pf;
    gl(g,C,12);g.beginPath();g.arc(px,py,2,0,Math.PI*2);g.fillStyle=rc(C,.8+pulse*.2);g.fill();ng(g);
  });
  // draw nodes
  pts.forEach((p,i)=>{
    const pulse=Math.sin(t+i*.7)*.5+.5,sz=i<3?4.5:3;
    // outer halo
    g.beginPath();g.arc(p.x,p.y,sz+4+pulse*5,0,Math.PI*2);g.fillStyle=rc(C,.04+pulse*.04);g.fill();
    // ring
    g.beginPath();g.arc(p.x,p.y,sz+2,0,Math.PI*2);g.strokeStyle=rc(C,.15+pulse*.2);g.lineWidth=1;g.stroke();
    // core
    gl(g,C,10+pulse*8);g.beginPath();g.arc(p.x,p.y,sz,0,Math.PI*2);g.fillStyle=rc(C,.6+pulse*.4);g.fill();ng(g);
    // bright center
    g.beginPath();g.arc(p.x,p.y,sz*.5,0,Math.PI*2);g.fillStyle=C;g.fill();
  });
}

// ── CONTENT: Dense typewriter terminal ────────────────────────────────────────
function vizCopy(g,W,H,C,t){
  // terminal bg
  g.fillStyle=rc(C,.04);g.fillRect(0,0,W,H);
  // scanlines
  for(let y=0;y<H;y+=3){g.fillStyle=rc(C,.012);g.fillRect(0,y,W,1)}
  const lines=[
    '> ANALYZING MARKET...',
    '# PRODUCT: Notion CRM Pro',
    'Price point: $12.00 USD',
    'Target: freelancers, teams',
    '','Writing SEO description...',
    '─────────────────────────',
    'Professional all-in-one CRM',
    'template for modern teams.',
    'Track clients, projects,',
    'invoices and pipeline from',
    'a single dashboard.',
    '─────────────────────────',
    'Tags: #notion #crm #2025',
    '#template #productivity',
    '> Publishing draft...',
    'Status: WRITING [████░░]',
    '> DONE. Next task queued.',
  ];
  const lh=12,p=7,total=lines.reduce((s,l)=>s+l.length+1,0);
  const shown=Math.floor((t*16)%total);
  let chars=0;
  g.font=`9px 'Courier New'`;
  lines.forEach((line,i)=>{
    const y=p+i*lh+lh;if(y>H+lh)return;
    let vis='';for(const c of line){if(chars++<shown)vis+=c}
    const isCmd=line.startsWith('>');
    const isHead=line.startsWith('#');
    const isSep=line.startsWith('─');
    if(isCmd){gl(g,C,8);g.fillStyle=C;}
    else if(isHead){g.fillStyle=rc(C,.85);}
    else if(isSep){g.fillStyle=rc(C,.25);}
    else{g.fillStyle=rc(C,.5);}
    g.fillText(vis,p,y);ng(g);
    if(chars>=shown&&chars<shown+5&&Math.sin(t*5)>0){
      const tw=g.measureText(vis).width;
      gl(g,C,8);g.fillStyle=C;g.fillRect(p+tw,y-9,2,11);ng(g);
    }
  });
}

// ── PUBLISH: Broadcast system ─────────────────────────────────────────────────
function vizPublish(g,W,H,C,t){
  const cx=W/2,apex=H*.28;
  // ambient
  const bg=g.createRadialGradient(cx,apex,0,cx,apex,W*.7);
  bg.addColorStop(0,rc(C,.12));bg.addColorStop(1,rc(C,.01));
  g.fillStyle=bg;g.fillRect(0,0,W,H);
  // broadcast rings — fill upper half
  for(let i=0;i<7;i++){
    const ph=(t*.55+i*.22)%1,r=ph*W*.62;
    gl(g,C,4*(1-ph));
    g.beginPath();g.arc(cx,apex,r,Math.PI,0);
    g.strokeStyle=rc(C,(1-ph)*.55);g.lineWidth=1.5;g.stroke();ng(g);
  }
  // tower structure
  const base=H*.82,h=H*.52;
  gl(g,C,14);g.strokeStyle=C;g.lineWidth=2;
  g.beginPath();g.moveTo(cx,base);g.lineTo(cx,base-h);g.stroke();
  // cross beams
  [[.2,.15],[.4,.22],[.65,.18]].forEach(([ht,w])=>{
    const y=base-h*ht,hw=w*W*.5;
    g.beginPath();g.moveTo(cx-hw,y);g.lineTo(cx+hw,y);g.stroke();
    g.beginPath();g.moveTo(cx-hw,y);g.lineTo(cx,base);g.strokeStyle=rc(C,.3);g.lineWidth=.8;g.stroke();
    g.beginPath();g.moveTo(cx+hw,y);g.lineTo(cx,base);g.stroke();
    g.strokeStyle=C;g.lineWidth=2;
  });
  ng(g);
  // apex pulse
  for(let i=3;i>=1;i--){gl(g,C,i*10);g.beginPath();g.arc(cx,apex,i*3.5,0,Math.PI*2);g.fillStyle=rc(C,.15*i);g.fill()}
  gl(g,C,30);g.beginPath();g.arc(cx,apex,4,0,Math.PI*2);g.fillStyle=C;g.fill();ng(g);
  // power meter
  const pw=(.5+Math.sin(t*1.6)*.38)*(W-24);
  g.fillStyle=rc(C,.08);g.fillRect(12,H-18,W-24,6);
  gl(g,C,6);g.fillStyle=rc(C,.8);g.fillRect(12,H-18,pw,6);ng(g);
  g.font='7px monospace';g.fillStyle=rc(C,.35);g.textAlign='center';
  g.fillText('TX POWER — '+Math.round(50+Math.sin(t*1.6)*38)+'%',cx,H-22);g.textAlign='left';
  // freq display
  g.font='8px monospace';g.fillStyle=rc(C,.25);
  g.fillText('FREQ: '+(2.4+Math.sin(t*.3)*.05).toFixed(3)+' GHz',10,H-28);
}

// ── ANALYTICS: Multi-ring data center ────────────────────────────────────────
function vizRings(g,W,H,C,t){
  const cx=W/2,cy=H/2;
  // bg radial
  const bg=g.createRadialGradient(cx,cy,0,cx,cy,Math.min(W,H)*.55);
  bg.addColorStop(0,rc(C,.13));bg.addColorStop(.6,rc(C,.04));bg.addColorStop(1,'transparent');
  g.fillStyle=bg;g.fillRect(0,0,W,H);
  // track rings (5)
  const arcs=[
    {R:.44,s:0,   pct:.80,w:7, sp:.42},
    {R:.34,s:1.3, pct:.60,w:5.5,sp:-.55},
    {R:.255,s:2.8,pct:.92,w:4.5,sp:.7},
    {R:.175,s:.6, pct:.45,w:3.5,sp:-.85},
    {R:.10, s:1.8,pct:.70,w:2.5,sp:1.1},
  ];
  arcs.forEach((a,i)=>{
    const R=Math.min(W,H)*a.R;
    // track
    g.beginPath();g.arc(cx,cy,R,0,Math.PI*2);g.strokeStyle=rc(C,.07);g.lineWidth=a.w+1;g.stroke();
    // arc
    const start=a.s+t*a.sp*.38,end=start+a.pct*Math.PI*2;
    gl(g,C,10+i*2);g.beginPath();g.arc(cx,cy,R,start,end);g.strokeStyle=rc(C,.85+i*.03);g.lineWidth=a.w;g.stroke();ng(g);
    // tip dot
    gl(g,C,18);g.beginPath();g.arc(cx+Math.cos(end)*R,cy+Math.sin(end)*R,a.w*.6+1,0,Math.PI*2);g.fillStyle=C;g.fill();ng(g);
  });
  // center glow
  for(let i=5;i>=1;i--){gl(g,C,i*8);g.beginPath();g.arc(cx,cy,i*4,0,Math.PI*2);g.fillStyle=rc(C,.08*i);g.fill()}
  gl(g,C,30);g.beginPath();g.arc(cx,cy,5,0,Math.PI*2);g.fillStyle=C;g.fill();ng(g);
  // value
  const pct=Math.round(65+Math.sin(t*.22)*18);
  g.font=`bold 13px 'Courier New'`;g.textAlign='center';g.textBaseline='middle';
  gl(g,C,12);g.fillStyle=C;g.fillText(pct+'%',cx,cy);ng(g);
  g.font=`7px 'Courier New'`;g.fillStyle=rc(C,.3);g.fillText('EFFICIENCY',cx,cy+14);
  g.textAlign='left';g.textBaseline='alphabetic';
  // corner mini charts
  const corner=[[8,8],[W-38,8],[8,H-22],[W-38,H-22]];
  const vals=[.72,.58,.85,.43];
  corner.forEach(([cx2,cy2],i)=>{
    g.fillStyle=rc(C,.08);g.fillRect(cx2,cy2,30,14);
    gl(g,C,4);g.fillStyle=rc(C,.6);g.fillRect(cx2,cy2+(1-vals[i])*14,30*vals[i],14*vals[i]);ng(g);
  });
}

// ── VIZ dispatch ──────────────────────────────────────────────────────────────
const DRAWS={radar:vizRadar,market:vizMarket,doc:vizDoc,finance:vizFinance,nodes:vizNodes,copy:vizCopy,publish:vizPublish,rings:vizRings};

// ── Build panel ───────────────────────────────────────────────────────────────
function buildPanel(id){
  const m=META[id]||{label:id.toUpperCase(),th:'t-cy',viz:'radar'};
  const col=COL[m.th]||'#00c8ff';
  const div=document.createElement('div');
  div.className=`panel ${m.th}`;div.id='p-'+id;
  div.innerHTML=`<div class="c-bl"></div><div class="c-br"></div>
<div class="ph"><span class="ph-id">${m.label}</span><div class="ph-st"><div class="ph-dot"></div><span>IDLE</span></div></div>
<div class="viz"><canvas></canvas></div>
<div class="xpbar"><div class="xpfill" style="width:0%"></div></div>
<div class="pf"><span class="pf-name">${id}</span><span class="pf-task">— standby —</span></div>`;
  const canvas=div.querySelector('canvas');
  const draw=DRAWS[m.viz]||vizRadar;
  let T=Math.random()*100;
  !function loop(){
    T+=.013;
    canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;
    if(canvas.width>0&&canvas.height>0){
      const g=canvas.getContext('2d');g.clearRect(0,0,canvas.width,canvas.height);
      try{draw(g,canvas.width,canvas.height,col,T)}catch(e){}
    }
    requestAnimationFrame(loop);
  }();
  return div;
}

function updPanel(id,data){
  const el=document.getElementById('p-'+id);if(!el)return;
  const busy=data?.status==='busy';
  el.classList.toggle('busy',busy);
  el.querySelector('.ph-dot').className='ph-dot'+(busy?' busy':'');
  el.querySelector('.ph-st span').textContent=busy?'BUSY':'IDLE';
  el.querySelector('.xpfill').style.width=(data?.xp_pct??0)+'%';
  el.querySelector('.pf-name').textContent=data?.name||id;
  const task=data?.current_task||'— standby —';
  el.querySelector('.pf-task').textContent=task.length>28?task.slice(0,28)+'…':task;
}

// ── Init panels ───────────────────────────────────────────────────────────────
const ORDER=['tinyagi','market-analyst','notion-creator','finance-creator','business-creator','copywriter','publisher','analytics'];
const grid=document.getElementById('grid');
ORDER.forEach(id=>grid.insertBefore(buildPanel(id),document.getElementById('log-term')));

// ── Log ───────────────────────────────────────────────────────────────────────
const AB={'tinyagi':'NEXUS','market-analyst':'MARKET','notion-creator':'DOC','finance-creator':'FIN','business-creator':'STRAT','copywriter':'COPY','publisher':'PUB','analytics':'STATS'};
let logN=0;
function pushLog(agent,msg,type=''){
  logN++;document.getElementById('log-ct').textContent=logN+' ev';
  const now=new Date(),ts=`${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}:${String(now.getSeconds()).padStart(2,'0')}`;
  const div=document.createElement('div');div.className='ll';
  div.innerHTML=`<span class="lt">${ts}</span><span class="la">[${AB[agent]||agent.slice(0,5).toUpperCase()}]</span><span class="lm ${type}">${msg}</span>`;
  const body=document.getElementById('log-body');
  body.prepend(div);while(body.children.length>14)body.removeChild(body.lastChild);
}

// ── Clock ─────────────────────────────────────────────────────────────────────
const T0=Date.now();
function tick(){
  const s=Math.floor((Date.now()-T0)/1000),d=Math.floor(s/86400)+1;
  const h=Math.floor(s%86400/3600),m=Math.floor(s%3600/60),ss=s%60;
  document.getElementById('hday').textContent=d;
  document.getElementById('clock').textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
}
setInterval(tick,1000);tick();

// ── API ───────────────────────────────────────────────────────────────────────
let prev={};
async function refresh(){
  try{
    const r=await fetch('/agents/status');if(!r.ok)return;
    const d=await r.json();const ags=d.agents||{};
    Object.entries(ags).forEach(([id,ag])=>{
      updPanel(id,ag);
      const pv=prev[id]||{};
      if(ag.status==='busy'&&pv.status!=='busy')pushLog(id,'▶ started task','ok');
      if(ag.status==='idle'&&pv.status==='busy')pushLog(id,'✓ completed','ok');
      if(ag.current_task&&ag.current_task!==pv.current_task)pushLog(id,(ag.current_task||'').slice(0,36));
      prev[id]={...ag};
    });
    const n=Object.keys(ags).length;
    document.getElementById('h-ag').textContent=n+'/8';
    document.getElementById('h-tasks').textContent=d.tasks_done??0;
    const pip=d.pipeline||{};
    document.getElementById('h-prd').textContent=(pip.done||0)+' LIVE';
    document.getElementById('h-rev').textContent='$'+((pip.done||0)*12).toFixed(2);
    document.getElementById('h-ord').textContent=pip.done||0;
  }catch(e){pushLog('sys','connection error','err')}
}
let cd=5;
setInterval(()=>{cd--;document.getElementById('rtag').textContent='↻'+cd+'s';if(cd<=0){refresh();cd=5}},1000);
refresh();

// ── Nav ───────────────────────────────────────────────────────────────────────
document.querySelectorAll('.bb').forEach(b=>b.addEventListener('click',function(){document.querySelectorAll('.bb').forEach(x=>x.classList.remove('on'));this.classList.add('on')}));
</script>
