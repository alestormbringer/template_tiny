<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TINYAGI // CONTROL HUB</title>
    <style>
        :root {
            --bg: #04040f;
            --bg-card: #08081a;
            --bg-panel: #060614;
            --cyan: #00ffff;
            --green: #00ff88;
            --orange: #ff6600;
            --red: #ff0044;
            --purple: #8844ff;
            --text: #8888bb;
            --text-bright: #d0d0ff;
            --border: #12122a;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', monospace;
            height: 100vh;
            overflow: hidden;
            background-image:
                linear-gradient(rgba(0,255,255,0.02) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,255,0.02) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* HEADER */
        header {
            height: 56px;
            background: var(--bg-panel);
            border-bottom: 1px solid rgba(0,255,255,0.3);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 32px;
            box-shadow: 0 0 30px rgba(0,255,255,0.08);
        }

        .logo {
            font-size: 16px;
            font-weight: bold;
            color: var(--cyan);
            text-shadow: 0 0 12px var(--cyan);
            letter-spacing: 4px;
            white-space: nowrap;
        }

        .header-stats { display: flex; gap: 28px; flex: 1; }

        .stat { display: flex; flex-direction: column; }
        .stat-label { font-size: 9px; color: var(--text); opacity: 0.5; letter-spacing: 1px; text-transform: uppercase; }
        .stat-value { font-size: 13px; font-weight: bold; color: var(--cyan); }
        .stat-value.green { color: var(--green); }
        .stat-value.orange { color: var(--orange); }

        .pulse-dot {
            display: inline-block;
            width: 7px; height: 7px;
            border-radius: 50%;
            background: var(--green);
            box-shadow: 0 0 8px var(--green);
            margin-right: 5px;
            animation: pulse 2s infinite;
        }

        @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.3} }
        @keyframes scan { 0%{top:-100%} 100%{top:100%} }
        @keyframes blink { 0%,100%{opacity:1} 49%{opacity:1} 50%{opacity:0} }

        .refresh-tag {
            font-size: 10px;
            color: var(--text);
            opacity: 0.35;
            margin-left: auto;
        }

        /* LAYOUT */
        .layout {
            display: grid;
            grid-template-columns: 210px 1fr 250px;
            height: calc(100vh - 56px);
        }

        /* PANELS */
        .panel {
            background: var(--bg-panel);
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        .left-panel { border-right: 1px solid var(--border); }
        .right-panel { border-left: 1px solid var(--border); }

        .panel-header {
            padding: 10px 14px;
            font-size: 10px;
            color: var(--cyan);
            letter-spacing: 2px;
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            gap: 8px;
            flex-shrink: 0;
        }

        .badge {
            background: rgba(0,255,255,0.12);
            border: 1px solid rgba(0,255,255,0.25);
            color: var(--cyan);
            font-size: 9px;
            padding: 1px 6px;
            border-radius: 10px;
        }

        /* AGENT LIST */
        .agent-list { flex: 1; overflow-y: auto; padding: 8px; }

        .agent-item {
            display: flex;
            align-items: center;
            gap: 9px;
            padding: 7px 10px;
            border-radius: 4px;
            cursor: pointer;
            border: 1px solid transparent;
            margin-bottom: 3px;
            transition: all 0.15s;
        }

        .agent-item:hover { border-color: rgba(0,255,255,0.3); background: rgba(0,255,255,0.04); }

        .a-dot {
            width: 7px; height: 7px;
            border-radius: 50%; flex-shrink: 0;
        }
        .d-idle  { background: var(--cyan);   box-shadow: 0 0 5px var(--cyan); }
        .d-busy  { background: var(--orange); box-shadow: 0 0 5px var(--orange); animation: pulse 0.8s infinite; }
        .d-off   { background: #222; }

        .a-info { flex: 1; min-width: 0; }
        .a-id   { font-size: 11px; color: var(--text-bright); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .a-role { font-size: 9px; color: var(--text); opacity: 0.5; }

        .add-btn {
            margin: 8px;
            padding: 9px;
            border: 1px dashed rgba(0,255,255,0.4);
            background: transparent;
            color: var(--cyan);
            font-family: monospace;
            font-size: 11px;
            cursor: pointer;
            border-radius: 4px;
            letter-spacing: 1px;
            transition: all 0.2s;
            flex-shrink: 0;
        }
        .add-btn:hover { background: rgba(0,255,255,0.08); box-shadow: 0 0 12px rgba(0,255,255,0.15); }

        /* CENTER */
        .center-panel {
            padding: 14px;
            overflow-y: auto;
            background: var(--bg);
        }

        .rooms-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
            gap: 14px;
        }

        .room {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 14px;
            position: relative;
            overflow: hidden;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .room:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,0.6); }

        .room::before {
            content: '';
            position: absolute;
            top: 0; left: 0; right: 0;
            height: 2px;
        }

        .room.idle   { border-color: rgba(0,255,255,0.15); }
        .room.busy   { border-color: rgba(255,102,0,0.35); }
        .room.done   { border-color: rgba(0,255,136,0.15); }

        .room.idle::before  { background: var(--cyan);   box-shadow: 0 0 8px var(--cyan); }
        .room.busy::before  { background: var(--orange); box-shadow: 0 0 8px var(--orange); }
        .room.done::before  { background: var(--green);  box-shadow: 0 0 8px var(--green); }

        .room.busy::after {
            content: '';
            position: absolute;
            top: -100%; left: 0; right: 0; height: 100%;
            background: linear-gradient(transparent 50%, rgba(255,102,0,0.025) 50%);
            background-size: 100% 4px;
            animation: scan 4s linear infinite;
            pointer-events: none;
        }

        .room-head {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        .room-label {
            font-size: 10px;
            color: var(--cyan);
            letter-spacing: 1px;
        }

        .ring {
            width: 10px; height: 10px;
            border-radius: 50%;
            border: 2px solid;
        }
        .ring-idle { border-color: var(--cyan);   box-shadow: 0 0 5px var(--cyan); }
        .ring-busy { border-color: var(--orange); box-shadow: 0 0 5px var(--orange); animation: pulse 0.8s infinite; }
        .ring-off  { border-color: #333; }

        .room-name  { font-size: 12px; color: var(--text-bright); font-weight: bold; margin-bottom: 2px; }
        .room-model { font-size: 9px; color: var(--text); opacity: 0.4; margin-bottom: 10px; }

        .room-log {
            background: rgba(0,0,0,0.35);
            border-left: 2px solid var(--border);
            border-radius: 3px;
            padding: 7px 8px;
            font-size: 9px;
            min-height: 44px;
            line-height: 1.7;
        }

        .log-line { color: var(--text); }
        .log-line.live { color: var(--green); }

        .room-foot {
            margin-top: 9px;
            display: flex;
            justify-content: space-between;
            font-size: 9px;
            opacity: 0.4;
        }

        /* QUEUE */
        .queue-body { flex: 1; overflow-y: auto; padding: 8px; }

        .q-item {
            padding: 8px 10px;
            border: 1px solid var(--border);
            border-radius: 4px;
            margin-bottom: 6px;
            font-size: 10px;
        }

        .q-item.running { border-color: rgba(255,102,0,0.4); background: rgba(255,102,0,0.04); }
        .q-item.pending { border-color: var(--border); }
        .q-item.done    { border-color: rgba(0,255,136,0.2); background: rgba(0,255,136,0.03); opacity: 0.55; }

        .q-status { font-size: 9px; margin-bottom: 3px; }
        .q-status.running { color: var(--orange); }
        .q-status.pending { color: var(--text); opacity: 0.5; }
        .q-status.done    { color: var(--green); }

        .q-task  { color: var(--text-bright); margin-bottom: 2px; }
        .q-agent { color: var(--text); opacity: 0.45; font-size: 9px; }

        /* ANALYTICS */
        .analytics-body {
            padding: 12px;
            border-top: 1px solid var(--border);
            flex-shrink: 0;
        }

        .a-row {
            display: flex;
            justify-content: space-between;
            padding: 5px 0;
            border-bottom: 1px solid var(--border);
            font-size: 10px;
        }
        .a-row:last-child { border-bottom: none; }
        .a-lbl { color: var(--text); opacity: 0.6; }
        .a-val { color: var(--green); font-weight: bold; }

        .api-notice {
            margin-top: 10px;
            font-size: 9px;
            color: var(--text);
            opacity: 0.3;
            text-align: center;
            line-height: 1.6;
        }

        ::-webkit-scrollbar { width: 3px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
        ::-webkit-scrollbar-thumb:hover { background: var(--cyan); opacity: 0.5; }
    </style>
</head>
<body>

<header>
    <div class="logo">◈ TINYAGI // HUB</div>
    <div class="header-stats">
        <div class="stat">
            <span class="stat-label">Sistema</span>
            <span class="stat-value"><span class="pulse-dot"></span>ONLINE</span>
        </div>
        <div class="stat">
            <span class="stat-label">Uptime</span>
            <span class="stat-value" id="uptime">—</span>
        </div>
        <div class="stat">
            <span class="stat-label">Agenti</span>
            <span class="stat-value" id="hdr-agents">—</span>
        </div>
        <div class="stat">
            <span class="stat-label">Revenue</span>
            <span class="stat-value green" id="hdr-revenue">$0.00</span>
        </div>
        <div class="stat">
            <span class="stat-label">Prodotti live</span>
            <span class="stat-value orange" id="hdr-products">0</span>
        </div>
    </div>
    <div class="refresh-tag" id="rtag">↻ 5s</div>
</header>

<div class="layout">

    <!-- LEFT -->
    <div class="panel left-panel">
        <div class="panel-header">
            ◈ AGENTI
            <span class="badge" id="badge-agents">0</span>
        </div>
        <div class="agent-list" id="agent-list"></div>
        <button class="add-btn" onclick="showAddHelp()">+ AGGIUNGI AGENTE</button>
    </div>

    <!-- CENTER -->
    <div class="center-panel">
        <div class="rooms-grid" id="rooms-grid"></div>
    </div>

    <!-- RIGHT -->
    <div class="panel right-panel">
        <div class="panel-header">◈ CODA LAVORI</div>
        <div class="queue-body" id="queue-body">
            <div class="q-item pending">
                <div class="q-status pending">⬡ STANDBY</div>
                <div class="q-task">Nessun task in coda</div>
                <div class="q-agent">— sistema in attesa —</div>
            </div>
        </div>

        <div class="analytics-body">
            <div class="panel-header" style="padding:0 0 10px;border:none;">◈ ANALYTICS</div>
            <div class="a-row"><span class="a-lbl">Revenue oggi</span><span class="a-val" id="rev-today">$0.00</span></div>
            <div class="a-row"><span class="a-lbl">Revenue mese</span><span class="a-val" id="rev-month">$0.00</span></div>
            <div class="a-row"><span class="a-lbl">Vendite totali</span><span class="a-val" id="sales-total">0</span></div>
            <div class="a-row"><span class="a-lbl">Prodotti live</span><span class="a-val" id="products-live">0</span></div>
            <div class="a-row"><span class="a-lbl">Top prodotto</span><span class="a-val" id="top-product" style="font-size:9px">—</span></div>
            <div class="api-notice">Collega Gumroad API<br>per dati reali</div>
        </div>
    </div>

</div>

<script>
    const API = window.location.origin.replace(':3000','') + ':8090';

    const ROLES = {
        'tinyagi':          'Orchestratore',
        'market-analyst':   'Market Analysis',
        'notion-creator':   'Notion / Produttività',
        'finance-creator':  'Finance / Excel',
        'business-creator': 'Business / Freelance',
        'template-creator': 'Template Creator',
        'copywriter':       'SEO Copywriting',
        'publisher':        'Gumroad Publisher',
        'analytics':        'Sales Analytics',
    };

    const ICONS = {
        'tinyagi':          '◈',
        'market-analyst':   '◎',
        'notion-creator':   '▣',
        'finance-creator':  '◆',
        'business-creator': '◉',
        'template-creator': '▣',
        'copywriter':       '◌',
        'publisher':        '▲',
        'analytics':        '◐',
    };

    let countdown = 5;

    function fmtUptime(s) {
        const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), ss = s%60;
        return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
    }

    function renderLeft(agents) {
        const entries = Object.entries(agents);
        document.getElementById('badge-agents').textContent = entries.length;
        document.getElementById('hdr-agents').textContent = entries.length;
        document.getElementById('agent-list').innerHTML = entries.map(([id, ag]) => `
            <div class="agent-item" onclick="scrollToRoom('${id}')">
                <div class="a-dot d-idle"></div>
                <div class="a-info">
                    <div class="a-id">${id}</div>
                    <div class="a-role">${ROLES[id] || ag.name || id}</div>
                </div>
            </div>
        `).join('');
    }

    function renderRooms(agents) {
        const entries = Object.entries(agents);
        document.getElementById('rooms-grid').innerHTML = entries.map(([id, ag]) => {
            const icon  = ICONS[id] || '◈';
            const role  = ROLES[id] || 'Agent';
            const model = ag.model || 'llama3.1:8b';
            const prov  = ag.provider || 'ollama-local';
            return `
            <div class="room idle" id="room-${id}">
                <div class="room-head">
                    <span class="room-label">${icon} ${id.toUpperCase()}</span>
                    <div class="ring ring-idle"></div>
                </div>
                <div class="room-name">${ag.name || id}</div>
                <div class="room-model">${model} · ${prov}</div>
                <div class="room-log">
                    <div class="log-line">${role}</div>
                    <div class="log-line" style="opacity:.35">— standby —</div>
                </div>
                <div class="room-foot">
                    <span>IDLE</span>
                    <span>—</span>
                </div>
            </div>`;
        }).join('');
    }

    function scrollToRoom(id) {
        document.getElementById('room-' + id)?.scrollIntoView({ behavior: 'smooth', block: 'center' });
    }

    function showAddHelp() {
        alert('Apri il terminale e lancia:\n\ndocker exec -it tinyagi npx tinyagi agent add');
    }

    async function fetchAgents() {
        try {
            const r = await fetch(`${API}/api/agents`);
            const d = await r.json();
            renderLeft(d);
            renderRooms(d);
        } catch(e) { console.warn('agents:', e); }
    }

    async function fetchStatus() {
        try {
            const r = await fetch(`${API}/api/status`);
            const d = await r.json();
            if (d.uptime != null)
                document.getElementById('uptime').textContent = fmtUptime(Math.floor(d.uptime));
        } catch(e) {}
    }

    function tick() {
        countdown--;
        document.getElementById('rtag').textContent = `↻ ${countdown}s`;
        if (countdown <= 0) {
            countdown = 5;
            refresh();
        }
    }

    async function refresh() {
        await Promise.all([fetchAgents(), fetchStatus()]);
    }

    refresh();
    setInterval(tick, 1000);
</script>
</body>
</html>
