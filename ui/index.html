<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>TINYAGI // CONTROL</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#010208;--panel:#03060f;--hdr:#020510;--text:#4a6080;--bright:#8ab0d0}
body{background:var(--bg);color:var(--text);font-family:'Courier New',monospace;font-size:12px;height:100vh;overflow:hidden;display:flex;flex-direction:column}

/* STARS */
#stars{position:fixed;inset:0;pointer-events:none;z-index:0}

/* HEADER */
header{position:relative;z-index:10;height:42px;flex-shrink:0;background:var(--hdr);border-bottom:1px solid rgba(0,180,255,.12);display:flex;align-items:center;padding:0 14px;gap:0;box-shadow:0 2px 24px rgba(0,100,200,.08)}
.logo{font-size:14px;letter-spacing:5px;color:#00c8ff;text-shadow:0 0 12px #00c8ff;margin-right:20px;white-space:nowrap}
.hm{display:flex;flex-direction:column;padding:0 14px;height:100%;justify-content:center;border-right:1px solid rgba(255,255,255,.04);border-left:1px solid rgba(255,255,255,.04)}
.hm-l{font-size:9px;opacity:.35;letter-spacing:1px;text-transform:uppercase;margin-bottom:1px}
.hm-v{font-size:13px;font-weight:bold;letter-spacing:.5px}
.c-cy{color:#00c8ff;text-shadow:0 0 8px #00c8ff}
.c-gn{color:#00ff88;text-shadow:0 0 8px #00ff88}
.c-or{color:#ff8800;text-shadow:0 0 8px #ff8800}
.c-yw{color:#ffdd00;text-shadow:0 0 8px #ffdd00}
.c-pu{color:#bb55ff;text-shadow:0 0 8px #bb55ff}
.c-wh{color:#c0d8f0}
.dot{display:inline-block;width:7px;height:7px;border-radius:50%;background:#00ff88;box-shadow:0 0 6px #00ff88;margin-right:5px;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
.hm-day{margin-left:auto;display:flex;align-items:center;gap:6px;padding:0 14px;border-left:1px solid rgba(255,255,255,.04)}
.day-v{font-size:12px;color:#4a6a80;letter-spacing:1px}
#clock{color:#00c8ff;font-size:12px}

/* MAIN */
main{position:relative;z-index:5;flex:1;overflow:hidden;padding:14px;display:flex;flex-direction:column;gap:10px}

/* GRID */
.grid{flex:1;display:grid;grid-template-columns:repeat(4,1fr);grid-template-rows:repeat(2,1fr);gap:10px}

/* PANEL */
.panel{background:var(--panel);border:1px solid var(--pc);border-radius:3px;display:flex;flex-direction:column;overflow:hidden;position:relative;box-shadow:0 0 16px rgba(var(--pr),.22),inset 0 0 30px rgba(var(--pr),.03);transition:box-shadow .3s;cursor:pointer}
.panel:hover{box-shadow:0 0 32px rgba(var(--pr),.5),inset 0 0 40px rgba(var(--pr),.07)}
.panel::before,.panel::after{content:'';position:absolute;width:10px;height:10px;border-color:var(--pc);border-style:solid;z-index:10}
.panel::before{top:-1px;left:-1px;border-width:2px 0 0 2px}
.panel::after{top:-1px;right:-1px;border-width:2px 2px 0 0}
.p-corner-bl,.p-corner-br{position:absolute;width:10px;height:10px;border-color:var(--pc);border-style:solid;z-index:10}
.p-corner-bl{bottom:-1px;left:-1px;border-width:0 0 2px 2px}
.p-corner-br{bottom:-1px;right:-1px;border-width:0 2px 2px 0}
.ph{display:flex;align-items:center;justify-content:space-between;padding:6px 10px;flex-shrink:0;border-bottom:1px solid rgba(var(--pr),.12);background:rgba(var(--pr),.04)}
.ph-id{font-size:10px;color:var(--pc);letter-spacing:2px;text-shadow:0 0 6px var(--pc)}
.ph-st{display:flex;align-items:center;gap:5px;font-size:9px}
.ph-dot{width:6px;height:6px;border-radius:50%;background:var(--pc);box-shadow:0 0 5px var(--pc)}
.ph-dot.busy{animation:blink .6s infinite}
.viz{flex:1;position:relative;overflow:hidden}
.viz canvas{position:absolute;inset:0;width:100%;height:100%}
.pf{padding:5px 10px;flex-shrink:0;border-top:1px solid rgba(var(--pr),.08);display:flex;justify-content:space-between;align-items:center}
.pf-name{font-size:10px;color:var(--bright)}
.pf-task{font-size:9px;opacity:.4;max-width:60%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.xpbar{height:2px;background:rgba(var(--pr),.15);flex-shrink:0}
.xpfill{height:100%;background:var(--pc);box-shadow:0 0 4px var(--pc);transition:width .8s}
.panel.busy .viz::after{content:'';position:absolute;left:0;right:0;height:1px;background:rgba(var(--pr),.3);box-shadow:0 0 8px var(--pc);animation:scanline 2.8s linear infinite;pointer-events:none;z-index:5}
@keyframes scanline{from{top:-2px}to{top:calc(100% + 2px)}}

/* THEMES */
.t-cy{--pc:#00c8ff;--pr:0,200,255}
.t-or{--pc:#ff8800;--pr:255,136,0}
.t-gn{--pc:#00ff88;--pr:0,255,136}
.t-yw{--pc:#ffdd00;--pr:255,221,0}
.t-pu{--pc:#bb55ff;--pr:187,85,255}
.t-pk{--pc:#ff44aa;--pr:255,68,170}
.t-rd{--pc:#ff5533;--pr:255,85,51}
.t-tl{--pc:#00ddcc;--pr:0,221,204}

/* BOTTOM BAR */
.bbar{flex-shrink:0;height:30px;display:flex;align-items:center;justify-content:center;gap:6px;border-top:1px solid rgba(255,255,255,.04)}
.bb{padding:4px 16px;border:1px solid transparent;background:transparent;color:var(--text);font-family:monospace;font-size:10px;letter-spacing:1px;cursor:pointer;border-radius:2px;transition:all .15s}
.bb:hover,.bb.on{border-color:rgba(0,200,255,.3);background:rgba(0,200,255,.05);color:#00c8ff}
#rtag{color:rgba(0,200,255,.3);font-size:9px;margin-left:auto;padding-right:4px}
::-webkit-scrollbar{width:3px}
::-webkit-scrollbar-thumb{background:rgba(0,200,255,.15)}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<header>
  <div class="logo">◈ TINYAGI</div>
  <div class="hm"><span class="hm-l">Revenue</span><span class="hm-v c-gn" id="h-rev">$0.00</span></div>
  <div class="hm"><span class="hm-l">Orders</span><span class="hm-v c-wh" id="h-ord">0</span></div>
  <div class="hm"><span class="hm-l">Products</span><span class="hm-v c-or" id="h-prd">0 LIVE</span></div>
  <div class="hm"><span class="hm-l">Agents</span><span class="hm-v c-cy" id="h-ag">0/8</span></div>
  <div class="hm"><span class="hm-l">Status</span><span class="hm-v c-gn"><span class="dot"></span>ONLINE</span></div>
  <div class="hm"><span class="hm-l">Tasks Done</span><span class="hm-v c-pu" id="h-tasks">0</span></div>
  <div class="hm-day"><span class="day-v">DAY <span id="hday">1</span> —</span><span id="clock">00:00:00</span></div>
  <div id="rtag">↻ 5s</div>
</header>

<main>
  <div class="grid" id="grid"></div>
  <div class="bbar">
    <button class="bb on">◈ HUB</button>
    <button class="bb">◎ PIPELINE</button>
    <button class="bb">⚔ AGENTS</button>
    <button class="bb">◐ ANALYTICS</button>
    <button class="bb">▲ PUBLISH</button>
    <button class="bb">⚙ SETTINGS</button>
  </div>
</main>

<script>
// ── Stars ─────────────────────────────────────────────────────────────────────
(function(){
  const c=document.getElementById('stars'), ctx=c.getContext('2d');
  c.width=window.innerWidth; c.height=window.innerHeight;
  const stars=Array.from({length:200},()=>({
    x:Math.random()*c.width, y:Math.random()*c.height,
    r:Math.random()*.9+.1, a:Math.random()*.5+.1,
    s:Math.random()*.003+.001, t:Math.random()*Math.PI*2
  }));
  function draw(){
    ctx.clearRect(0,0,c.width,c.height);
    stars.forEach(s=>{s.t+=s.s;const a=s.a*(0.5+0.5*Math.sin(s.t));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(180,220,255,${a})`;ctx.fill()});
    requestAnimationFrame(draw);
  }
  draw();
  window.addEventListener('resize',()=>{c.width=window.innerWidth;c.height=window.innerHeight});
})();

// ── Agent meta ────────────────────────────────────────────────────────────────
const META={
  'tinyagi':         {label:'NEXUS',     th:'t-cy',viz:'radar'},
  'market-analyst':  {label:'MARKET',    th:'t-or',viz:'wave'},
  'notion-creator':  {label:'DOC FORGE', th:'t-gn',viz:'docs'},
  'finance-creator': {label:'FINANCE',   th:'t-yw',viz:'bars'},
  'business-creator':{label:'STRATEGY',  th:'t-pu',viz:'nodes'},
  'copywriter':      {label:'CONTENT',   th:'t-pk',viz:'typer'},
  'publisher':       {label:'PUBLISH',   th:'t-rd',viz:'signal'},
  'analytics':       {label:'ANALYTICS', th:'t-tl',viz:'rings'},
};
const COLORS={'t-cy':'#00c8ff','t-or':'#ff8800','t-gn':'#00ff88','t-yw':'#ffdd00','t-pu':'#bb55ff','t-pk':'#ff44aa','t-rd':'#ff5533','t-tl':'#00ddcc'};

// ── Viz engine ────────────────────────────────────────────────────────────────
function hex2rgb(h){return[parseInt(h.slice(1,3),16),parseInt(h.slice(3,5),16),parseInt(h.slice(5,7),16)]}
function rgba(col,a){const[r,g,b]=hex2rgb(col);return`rgba(${r},${g},${b},${a})`}

function drawRadar(g,W,H,col,t){
  const cx=W/2,cy=H/2,max=Math.min(W,H)*.42;
  [.25,.5,.75,1].forEach(f=>{g.beginPath();g.arc(cx,cy,max*f,0,Math.PI*2);g.strokeStyle=rgba(col,.06+f*.04);g.lineWidth=.5;g.stroke()});
  [[cx-max,cy,cx+max,cy],[cx,cy-max,cx,cy+max]].forEach(([x1,y1,x2,y2])=>{g.beginPath();g.moveTo(x1,y1);g.lineTo(x2,y2);g.strokeStyle=rgba(col,.06);g.lineWidth=.5;g.stroke()});
  const sw=t*1.5;
  g.save();g.translate(cx,cy);g.rotate(sw);
  const sg=g.createLinearGradient(0,0,max,0);
  sg.addColorStop(0,rgba(col,.5));sg.addColorStop(1,rgba(col,0));
  g.beginPath();g.moveTo(0,0);g.arc(0,0,max,-.7,0,false);g.fillStyle=sg;g.fill();
  g.restore();
  const bx=cx+Math.cos(t*.7)*max*.55,by=cy+Math.sin(t*.7)*max*.55;
  g.beginPath();g.arc(bx,by,2.5,0,Math.PI*2);g.fillStyle=col;g.shadowColor=col;g.shadowBlur=8;g.fill();g.shadowBlur=0;
  g.beginPath();g.arc(cx,cy,3,0,Math.PI*2);g.fillStyle=col;g.shadowColor=col;g.shadowBlur=10;g.fill();g.shadowBlur=0;
}

function drawWave(g,W,H,col,t){
  const pad=14,cy=H/2;
  for(let i=0;i<5;i++){const y=pad+i*(H-pad*2)/4;g.beginPath();g.moveTo(pad,y);g.lineTo(W-pad,y);g.strokeStyle=rgba(col,.05);g.lineWidth=.5;g.stroke()}
  g.beginPath();
  for(let x=0;x<=W-pad*2;x+=2){const v=Math.sin(x*.04+t*1.2)*.3+Math.sin(x*.02+t*.7)*.2+Math.sin(x*.1+t*2)*.1;const y=cy+v*(H*.28);x===0?g.moveTo(pad+x,y):g.lineTo(pad+x,y)}
  g.strokeStyle=rgba(col,.85);g.lineWidth=1.5;g.stroke();
  g.lineTo(W-pad,H-pad);g.lineTo(pad,H-pad);g.fillStyle=rgba(col,.05);g.fill();
  g.beginPath();
  for(let x=0;x<=W-pad*2;x+=3){const v=Math.sin(x*.03+t*.9+1)*.2+Math.sin(x*.07+t*1.5)*.1;const y=cy+v*(H*.2)+H*.15;x===0?g.moveTo(pad+x,y):g.lineTo(pad+x,y)}
  g.strokeStyle=rgba(col,.22);g.lineWidth=.8;g.stroke();
  const dx=((t*40)%(W-pad*2))+pad,dv=Math.sin(dx*.04+t*1.2)*.3+Math.sin(dx*.02+t*.7)*.2;
  g.beginPath();g.arc(dx,cy+dv*(H*.28),3,0,Math.PI*2);g.fillStyle=col;g.shadowColor=col;g.shadowBlur=8;g.fill();g.shadowBlur=0;
}

function drawDocs(g,W,H,col,t){
  const pad=12,lh=10,offset=(t*12)%lh;
  const lines=[1,.7,.9,.5,.8,.6,.95,.45,.75,.85,.6,.9,.5,.7,.8,.9,.65];
  lines.forEach((w,i)=>{
    const y=pad+i*lh-offset;if(y<pad-lh||y>H-pad+lh)return;
    const lw=(W-pad*2)*w;
    g.beginPath();g.moveTo(pad,y);g.lineTo(pad+lw,y);
    g.strokeStyle=rgba(col,i===2?.75:.18+w*.12);g.lineWidth=i===2?1.5:.8;g.stroke();
  });
  if(Math.sin(t*3)>0){g.fillStyle=rgba(col,.9);g.fillRect(pad+12+(W-pad*2)*.9,pad+2*lh-offset-7,1.5,9)}
  g.fillStyle=rgba(col,.07);g.fillRect(pad,pad-offset-2,(W-pad*2)*.95,8);
  g.fillStyle=rgba(col,.45);g.fillRect(pad,pad-offset-2,55,8);
}

function drawBars(g,W,H,col,t){
  const n=8,pad=14,bw=(W-pad*2)/n,gap=3;
  const grad=g.createLinearGradient(0,H,0,pad);
  grad.addColorStop(0,rgba(col,.75));grad.addColorStop(1,rgba(col,.2));
  for(let i=0;i<n;i++){
    const h=(Math.sin(i*.7+t*.5)*.3+.6+Math.sin(i*1.3+t*.3)*.15)*(H-pad*2);
    const x=pad+i*bw+gap/2,y=H-pad-h;
    g.fillStyle=rgba(col,.07);g.fillRect(x,pad,bw-gap,H-pad*2);
    g.fillStyle=grad;g.fillRect(x,y,bw-gap,h);
    g.fillStyle=col;g.shadowColor=col;g.shadowBlur=5;g.fillRect(x,y,bw-gap,2);g.shadowBlur=0;
  }
  g.beginPath();
  for(let i=0;i<=n;i++){const h=(Math.sin(i*.7+t*.5)*.3+.6+Math.sin(i*1.3+t*.3)*.15)*(H-pad*2);const x=pad+i*bw+(bw-gap)/2,y=H-pad-h;i===0?g.moveTo(x,y):g.lineTo(x,y)}
  g.strokeStyle=rgba(col,.3);g.lineWidth=1;g.setLineDash([3,3]);g.stroke();g.setLineDash([]);
}

function drawNodes(g,W,H,col,t){
  const ns=[{x:.5,y:.28},{x:.18,y:.55},{x:.82,y:.55},{x:.33,y:.82},{x:.67,y:.82},{x:.08,y:.28},{x:.92,y:.28},{x:.5,y:.95}];
  const edges=[[0,1],[0,2],[1,3],[2,4],[3,4],[0,5],[0,6],[3,7],[4,7],[1,5],[2,6]];
  const pts=ns.map(n=>({x:n.x*W,y:n.y*H}));
  edges.forEach(([a,b])=>{
    const pulse=Math.sin(t*2+a+b)*.5+.5;
    g.beginPath();g.moveTo(pts[a].x,pts[a].y);g.lineTo(pts[b].x,pts[b].y);
    g.strokeStyle=rgba(col,.05+pulse*.08);g.lineWidth=.8;g.stroke();
    if(pulse>.7){const pf=(t*1.5+a*.3)%1,px=pts[a].x+(pts[b].x-pts[a].x)*pf,py=pts[a].y+(pts[b].y-pts[a].y)*pf;g.beginPath();g.arc(px,py,1.5,0,Math.PI*2);g.fillStyle=col;g.shadowColor=col;g.shadowBlur=5;g.fill();g.shadowBlur=0}
  });
  pts.forEach((p,i)=>{
    const pulse=Math.sin(t*1.5+i)*.5+.5;
    g.beginPath();g.arc(p.x,p.y,4+pulse*2,0,Math.PI*2);g.fillStyle=rgba(col,.1+pulse*.1);g.fill();
    g.beginPath();g.arc(p.x,p.y,3,0,Math.PI*2);g.fillStyle=col;g.shadowColor=col;g.shadowBlur=8;g.fill();g.shadowBlur=0;
  });
}

function drawTyper(g,W,H,col,t){
  const lines=['# PRODUCT LISTING','','Title: Notion CRM 2025','Price: $12.00','','Description:','Professional template for','freelancers & small teams.','Includes CRM, Projects,','Invoice tracker, Pipeline.','','Tags: #notion #template','#crm #productivity #2025'];
  const lh=13,pad=10,total=lines.reduce((a,l)=>a+l.length+1,0);
  const shown=Math.floor((t*20)%total);
  let chars=0;
  g.font=`9px 'Courier New'`;
  lines.forEach((line,i)=>{
    const y=pad+i*lh;if(y>H)return;
    let vis='';for(const c of line){if(chars++<shown)vis+=c}
    const head=line.startsWith('#');
    g.fillStyle=head?col:rgba(col,line.startsWith('Title')||line.startsWith('Price')?0.65:0.38);
    g.fillText(vis,pad,y+lh);
    if(chars>=shown&&chars<shown+8&&Math.sin(t*6)>0){const tw=g.measureText(vis).width;g.fillStyle=col;g.fillRect(pad+tw,y+3,1.5,9)}
  });
}

function drawSignal(g,W,H,col,t){
  const cx=W/2,cy=H*.58;
  g.strokeStyle=rgba(col,.6);g.lineWidth=1.5;
  g.beginPath();g.moveTo(cx,cy);g.lineTo(cx,cy-H*.38);g.stroke();
  g.beginPath();g.moveTo(cx-8,cy);g.lineTo(cx+8,cy);g.stroke();
  g.beginPath();g.moveTo(cx-14,cy+8);g.lineTo(cx+14,cy+8);g.stroke();
  for(let i=0;i<4;i++){
    const phase=(t*.7+i*.35)%1,r=phase*Math.min(W,H)*.5;
    g.beginPath();g.arc(cx,cy-H*.38,r,Math.PI,0);
    g.strokeStyle=rgba(col,(1-phase)*.5);g.lineWidth=1;g.stroke();
  }
  g.beginPath();g.arc(cx,cy-H*.38,4,0,Math.PI*2);g.fillStyle=col;g.shadowColor=col;g.shadowBlur=12;g.fill();g.shadowBlur=0;
  g.fillStyle=rgba(col,.15);g.fillRect(cx-18,cy,36,5);
  const pw=((Math.sin(t*2)*.25)+.72)*(W-28);
  g.fillStyle=rgba(col,.1);g.fillRect(14,H-14,W-28,4);
  g.fillStyle=col;g.shadowColor=col;g.shadowBlur=4;g.fillRect(14,H-14,pw,4);g.shadowBlur=0;
}

function drawRings(g,W,H,col,t){
  const cx=W/2,cy=H/2;
  const arcs=[{r:.38,s:0,pct:.72,w:5},{r:.28,s:1.2,pct:.55,w:4},{r:.20,s:2.5,pct:.88,w:3.5},{r:.13,s:.5,pct:.40,w:3}];
  arcs.forEach(a=>{
    const R=Math.min(W,H)*a.r;
    g.beginPath();g.arc(cx,cy,R,0,Math.PI*2);g.strokeStyle=rgba(col,.08);g.lineWidth=a.w;g.stroke();
    const end=a.s+t*.4+a.pct*Math.PI*2;
    g.beginPath();g.arc(cx,cy,R,a.s+t*.4,end);g.strokeStyle=col;g.shadowColor=col;g.shadowBlur=6;g.lineWidth=a.w;g.stroke();g.shadowBlur=0;
    g.beginPath();g.arc(cx+Math.cos(end)*R,cy+Math.sin(end)*R,a.w/2+1,0,Math.PI*2);g.fillStyle=col;g.fill();
  });
  g.beginPath();g.arc(cx,cy,5,0,Math.PI*2);g.fillStyle=col;g.shadowColor=col;g.shadowBlur=14;g.fill();g.shadowBlur=0;
  g.font="bold 11px 'Courier New'";g.textAlign='center';g.textBaseline='middle';
  g.fillStyle=rgba(col,.7);g.fillText(Math.round(72+Math.sin(t*.3)*8)+'%',cx,cy);
  g.textAlign='left';g.textBaseline='alphabetic';
}

const DRAWS={radar:drawRadar,wave:drawWave,docs:drawDocs,bars:drawBars,nodes:drawNodes,typer:drawTyper,signal:drawSignal,rings:drawRings};

// ── Build panel ───────────────────────────────────────────────────────────────
function buildPanel(id,data){
  const m=META[id]||{label:id.toUpperCase(),th:'t-cy',viz:'radar'};
  const col=COLORS[m.th]||'#00c8ff';
  const busy=data?.status==='busy';
  const xpPct=data?.xp_pct??0;
  const task=data?.current_task||'— standby —';
  const div=document.createElement('div');
  div.className=`panel ${m.th}${busy?' busy':''}`;
  div.id='panel-'+id;
  div.innerHTML=`<div class="p-corner-bl"></div><div class="p-corner-br"></div>
    <div class="ph"><span class="ph-id">${m.label}</span><div class="ph-st"><div class="ph-dot${busy?' busy':''}"></div><span style="color:var(--pc)">${busy?'BUSY':'IDLE'}</span></div></div>
    <div class="viz"><canvas></canvas></div>
    <div class="xpbar"><div class="xpfill" style="width:${xpPct}%"></div></div>
    <div class="pf"><span class="pf-name">${data?.name||id}</span><span class="pf-task">${task.length>32?task.slice(0,32)+'…':task}</span></div>`;
  const canvas=div.querySelector('canvas');
  const draw=DRAWS[m.viz]||drawRadar;
  let t=Math.random()*100;
  function loop(){
    t+=0.016;
    canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight;
    const g=canvas.getContext('2d');g.clearRect(0,0,canvas.width,canvas.height);
    draw(g,canvas.width,canvas.height,col,t);
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);
  return div;
}

function updatePanel(id,data){
  const el=document.getElementById('panel-'+id);if(!el)return;
  const busy=data?.status==='busy';
  const xpPct=data?.xp_pct??0;
  const task=data?.current_task||'— standby —';
  el.classList.toggle('busy',busy);
  el.querySelector('.ph-dot').className=`ph-dot${busy?' busy':''}`;
  el.querySelector('.ph-st span').textContent=busy?'BUSY':'IDLE';
  el.querySelector('.xpfill').style.width=xpPct+'%';
  el.querySelector('.pf-name').textContent=data?.name||id;
  el.querySelector('.pf-task').textContent=task.length>32?task.slice(0,32)+'…':task;
}

// ── Init ──────────────────────────────────────────────────────────────────────
const ORDER=['tinyagi','market-analyst','notion-creator','finance-creator','business-creator','copywriter','publisher','analytics'];
const grid=document.getElementById('grid');
ORDER.forEach(id=>{grid.appendChild(buildPanel(id,null))});

// ── Clock ─────────────────────────────────────────────────────────────────────
const T0=Date.now();
function tick(){
  const s=Math.floor((Date.now()-T0)/1000),d=Math.floor(s/86400)+1;
  const h=Math.floor(s%86400/3600),m=Math.floor(s%3600/60),ss=s%60;
  document.getElementById('hday').textContent=d;
  document.getElementById('clock').textContent=`${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
}
setInterval(tick,1000);tick();

// ── API ───────────────────────────────────────────────────────────────────────
async function refresh(){
  try{
    const r=await fetch('/agents/status');if(!r.ok)return;
    const d=await r.json();const ags=d.agents||{};
    Object.entries(ags).forEach(([id,ag])=>updatePanel(id,ag));
    const n=Object.keys(ags).length;
    document.getElementById('h-ag').textContent=`${n}/8 ACTIVE`;
    document.getElementById('h-tasks').textContent=d.tasks_done??0;
    const pip=d.pipeline||{};
    document.getElementById('h-prd').textContent=`${pip.done||0} LIVE`;
    document.getElementById('h-rev').textContent=`$${((pip.done||0)*12).toFixed(2)}`;
    document.getElementById('h-ord').textContent=pip.done||0;
  }catch(e){}
}
let cd=5;
setInterval(()=>{cd--;document.getElementById('rtag').textContent=`↻ ${cd}s`;if(cd<=0){refresh();cd=5}},1000);
refresh();

// ── Nav ───────────────────────────────────────────────────────────────────────
document.querySelectorAll('.bb').forEach(b=>{b.addEventListener('click',function(){document.querySelectorAll('.bb').forEach(x=>x.classList.remove('on'));this.classList.add('on')})});
</script>
