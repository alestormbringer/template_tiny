<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TINYAGI // CONTROL HUB</title>
    <style>
        :root {
            --bg:          #030308;
            --bg-card:     #07071a;
            --bg-panel:    #05050f;
            --cyan:        #00ffff;
            --green:       #00ff88;
            --orange:      #ff6600;
            --text:        #7070aa;
            --text-bright: #c8c8f0;
            --border:      #0f0f28;
        }

        * { margin:0; padding:0; box-sizing:border-box; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: 'Courier New', monospace;
            font-size: 14px;
            height: 100vh;
            overflow: hidden;
            background-image:
                linear-gradient(rgba(0,255,255,.018) 1px, transparent 1px),
                linear-gradient(90deg, rgba(0,255,255,.018) 1px, transparent 1px);
            background-size: 40px 40px;
        }

        /* ── ANIMATIONS ── */
        @keyframes pulse      { 0%,100%{opacity:1}  50%{opacity:.3} }
        @keyframes flicker    { 0%,91%,100%{opacity:1}  93%{opacity:.6}  95%{opacity:.9}  97%{opacity:.5} }
        @keyframes scan       { 0%{top:-100%}  100%{top:100%} }
        @keyframes breathe    { 0%,100%{transform:scaleY(1) translateY(0)}  50%{transform:scaleY(1.04) translateY(-1px)} }
        @keyframes patrol     { 0%{left:10%}   100%{left:58%} }
        @keyframes arm-l      { from{transform:rotate(-38deg)}  to{transform:rotate(22deg)} }
        @keyframes arm-r      { from{transform:rotate(22deg)}   to{transform:rotate(-38deg)} }
        @keyframes leg-l      { from{transform:rotate(-28deg)}  to{transform:rotate(28deg)} }
        @keyframes leg-r      { from{transform:rotate(28deg)}   to{transform:rotate(-28deg)} }
        @keyframes bob        { 0%,100%{transform:translateY(0)}  50%{transform:translateY(-2px)} }
        @keyframes float-y    { 0%,100%{transform:translateY(0)}  50%{transform:translateY(-8px)} }
        @keyframes spin-slow  { from{transform:rotate(0)}  to{transform:rotate(360deg)} }
        @keyframes dash       { to{stroke-dashoffset:-24} }
        @keyframes expand-ring{ 0%{r:8;opacity:.5}  100%{r:50;opacity:0} }
        @keyframes bar-grow   { 0%{height:20%}  50%{height:80%}  100%{height:40%} }

        /* ── HEADER ── */
        header {
            height: 60px;
            background: var(--bg-panel);
            border-bottom: 1px solid rgba(0,255,255,.22);
            display: flex; align-items: center;
            padding: 0 24px; gap: 32px;
            box-shadow: 0 0 40px rgba(0,255,255,.05);
            flex-shrink: 0;
        }

        .logo {
            font-size: 20px; font-weight: bold;
            color: var(--cyan);
            text-shadow: 0 0 14px var(--cyan);
            letter-spacing: 4px; white-space: nowrap;
            animation: flicker 10s infinite;
        }

        .hstats { display:flex; gap:30px; flex:1; }

        .hstat { display:flex; flex-direction:column; }
        .hstat-lbl { font-size:10px; opacity:.45; letter-spacing:1px; text-transform:uppercase; }
        .hstat-val { font-size:16px; font-weight:bold; color:var(--cyan); }
        .hstat-val.green  { color:var(--green); }
        .hstat-val.orange { color:var(--orange); }

        .pdot {
            display:inline-block; width:8px; height:8px;
            border-radius:50%; background:var(--green);
            box-shadow:0 0 8px var(--green);
            margin-right:5px; animation:pulse 2s infinite;
        }

        .rtag { font-size:11px; opacity:.3; margin-left:auto; }

        /* ── LAYOUT ── */
        .layout {
            display: grid;
            grid-template-columns: 225px 1fr 265px;
            height: calc(100vh - 60px);
        }

        /* ── SIDE PANELS ── */
        .spanel {
            background: var(--bg-panel);
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        .spanel.left  { border-right: 1px solid var(--border); }
        .spanel.right { border-left:  1px solid var(--border); }

        .phdr {
            padding: 12px 16px;
            font-size: 12px; color: var(--cyan);
            letter-spacing: 2px;
            border-bottom: 1px solid var(--border);
            display: flex; align-items: center; gap: 8px;
            flex-shrink: 0;
        }

        .badge {
            background: rgba(0,255,255,.1);
            border: 1px solid rgba(0,255,255,.22);
            color: var(--cyan); font-size: 10px;
            padding: 1px 8px; border-radius: 10px;
        }

        /* ── AGENT LIST ── */
        .alist { flex:1; overflow-y:auto; padding:8px; }

        .aitem {
            display:flex; align-items:center; gap:10px;
            padding:9px 12px; border-radius:5px;
            cursor:pointer; border:1px solid transparent;
            margin-bottom:4px; transition:all .15s;
        }
        .aitem:hover { border-color:rgba(0,255,255,.28); background:rgba(0,255,255,.04); }

        .adot { width:9px; height:9px; border-radius:50%; flex-shrink:0; }
        .d-idle { background:var(--cyan);   box-shadow:0 0 6px var(--cyan); }
        .d-busy { background:var(--orange); box-shadow:0 0 6px var(--orange); animation:pulse .8s infinite; }
        .d-off  { background:#222; }

        .ainfo { flex:1; min-width:0; }
        .aid   { font-size:13px; color:var(--text-bright); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
        .arole { font-size:10px; opacity:.5; }

        .add-btn {
            margin:8px; padding:11px;
            border:1px dashed rgba(0,255,255,.35);
            background:transparent; color:var(--cyan);
            font-family:monospace; font-size:12px;
            cursor:pointer; border-radius:5px; letter-spacing:1px;
            transition:all .2s; flex-shrink:0;
        }
        .add-btn:hover { background:rgba(0,255,255,.07); box-shadow:0 0 16px rgba(0,255,255,.14); }

        /* ── CENTER ── */
        .cpanel {
            overflow-y: auto;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 20px;
            background: var(--bg);
        }

        .rwrap {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            align-content: center;
            gap: 20px;
            width: 100%;
        }

        /* ── ROOM CARD ── */
        .rcard {
            width: 230px;
            background: var(--bg-card);
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid var(--border);
            transition: transform .2s, box-shadow .2s;
            cursor: pointer;
        }
        .rcard:hover {
            transform: translateY(-4px);
            box-shadow: 0 14px 35px rgba(0,0,0,.75),
                        0 0 25px rgba(var(--glow-rgb),.08);
        }

        /* top glow bar */
        .rcard::before {
            content:''; display:block; height:2px;
            background: var(--glow);
            box-shadow: 0 0 12px var(--glow);
        }

        .rcard-hdr {
            padding: 10px 13px;
            display: flex; justify-content: space-between; align-items: center;
            border-bottom: 1px solid var(--border);
        }
        .rlabel { font-size:11px; color:var(--glow); letter-spacing:1px; text-shadow:0 0 6px var(--glow); }
        .rstatus { display:flex; align-items:center; gap:5px; font-size:10px; color:var(--text); }
        .rring {
            width:9px; height:9px; border-radius:50%;
            border:2px solid var(--glow);
            box-shadow:0 0 5px var(--glow);
        }
        .rring.busy { animation:pulse .8s infinite; }

        /* ── INTERIOR ── */
        .rint {
            height: 175px;
            position: relative;
            overflow: hidden;
        }

        /* scan on busy */
        .rcard.busy .rint::after {
            content:'';
            position:absolute; top:-100%; left:0; right:0; height:100%;
            background:linear-gradient(transparent 50%, rgba(255,102,0,.022) 50%);
            background-size:100% 4px;
            animation:scan 5s linear infinite;
            pointer-events:none;
        }

        /* floor line */
        .rfloor {
            position:absolute; bottom:0; left:0; right:0; height:2px;
            background:linear-gradient(90deg, transparent, var(--glow), transparent);
            opacity:.35;
        }

        /* ── HUMANOID ── */
        .human {
            position: absolute;
            bottom: 10px;
            display: flex; flex-direction: column; align-items: center;
            width: 26px;
            transform-origin: bottom center;
        }
        .human.idle {
            left: 38%;
            animation: breathe 3.5s ease-in-out infinite;
        }
        .human.walking {
            animation: patrol 3s ease-in-out infinite alternate;
        }
        .human.walking .hhead { animation: bob .35s ease-in-out infinite alternate; }
        .human.walking .htorso::before { animation: arm-l .35s ease-in-out infinite alternate; }
        .human.walking .htorso::after  { animation: arm-r .35s ease-in-out infinite alternate; }
        .human.walking .hlegl { animation: leg-l .35s ease-in-out infinite alternate; }
        .human.walking .hlegr { animation: leg-r .35s ease-in-out infinite alternate; }

        .hhead {
            width:13px; height:13px; border-radius:50%;
            background: var(--glow);
            box-shadow: 0 0 8px var(--glow), 0 0 18px var(--glow);
            margin-bottom:2px; flex-shrink:0;
        }
        .htorso {
            width:11px; height:15px;
            background: var(--glow); opacity:.85;
            border-radius:2px; position:relative;
            margin-bottom:2px; flex-shrink:0;
        }
        .htorso::before, .htorso::after {
            content:'';
            position:absolute;
            width:5px; height:12px;
            background:var(--glow); opacity:.8;
            border-radius:2px; top:1px;
            transform-origin:top center;
        }
        .htorso::before { left:-6px; }
        .htorso::after  { right:-6px; }
        .hlegs { display:flex; gap:2px; }
        .hlegl, .hlegr {
            width:5px; height:12px;
            background:var(--glow); opacity:.8;
            border-radius:2px;
            transform-origin:top center;
        }

        /* ── ROOM THEMES ── */
        .th-tinyagi  { background:radial-gradient(ellipse at 50% 100%,#150030 0%,#06001a 100%); --glow:#aa44ff; }
        .th-analyst  { background:radial-gradient(ellipse at 50% 100%,#001535 0%,#000c20 100%); --glow:#0088ff; }
        .th-notion   { background:radial-gradient(ellipse at 50% 100%,#002518 0%,#001510 100%); --glow:#00ffaa; }
        .th-finance  { background:radial-gradient(ellipse at 50% 100%,#241300 0%,#130900 100%); --glow:#ffaa00; }
        .th-business { background:radial-gradient(ellipse at 50% 100%,#10122c 0%,#08091c 100%); --glow:#8899ee; }
        .th-copy     { background:radial-gradient(ellipse at 50% 100%,#24001a 0%,#14000e 100%); --glow:#ff44cc; }
        .th-publish  { background:radial-gradient(ellipse at 50% 100%,#241000 0%,#140600 100%); --glow:#ff6600; }
        .th-analytics{ background:radial-gradient(ellipse at 50% 100%,#001c24 0%,#000f14 100%); --glow:#00e5ff; }

        /* ── ROOM FOOTER ── */
        .rfoot { padding:11px 13px; border-top:1px solid var(--border); }
        .rfname  { font-size:14px; color:var(--text-bright); font-weight:bold; margin-bottom:2px; }
        .rfmodel { font-size:10px; opacity:.4; margin-bottom:7px; }
        .rflog {
            font-size:11px; color:var(--text); line-height:1.7;
            background:rgba(0,0,0,.3);
            border-left:2px solid var(--border);
            padding:5px 8px; border-radius:2px;
        }
        .rflog.live { border-color:var(--orange); color:var(--orange); }
        .rfst {
            margin-top:7px; font-size:10px; opacity:.38;
            display:flex; justify-content:space-between;
        }

        /* ── QUEUE ── */
        .qbody { flex:1; overflow-y:auto; padding:8px; }
        .qitem {
            padding:9px 11px; border:1px solid var(--border);
            border-radius:4px; margin-bottom:6px; font-size:11px;
        }
        .qitem.running { border-color:rgba(255,102,0,.4); background:rgba(255,102,0,.04); }
        .qitem.done    { border-color:rgba(0,255,136,.2);  background:rgba(0,255,136,.03); opacity:.55; }
        .qst { font-size:10px; margin-bottom:3px; }
        .qst.running { color:var(--orange); }
        .qst.pending { color:var(--text); opacity:.5; }
        .qst.done    { color:var(--green); }
        .qtask  { color:var(--text-bright); margin-bottom:2px; font-size:12px; }
        .qagent { opacity:.4; font-size:10px; }

        /* ── ANALYTICS ── */
        .abody { padding:14px; border-top:1px solid var(--border); flex-shrink:0; }
        .arow {
            display:flex; justify-content:space-between;
            padding:6px 0; border-bottom:1px solid var(--border);
            font-size:12px;
        }
        .arow:last-child { border-bottom:none; }
        .albl { opacity:.6; }
        .aval { color:var(--green); font-weight:bold; }
        .anotice { margin-top:10px; font-size:10px; opacity:.28; text-align:center; line-height:1.7; }

        ::-webkit-scrollbar { width:3px; }
        ::-webkit-scrollbar-track { background:transparent; }
        ::-webkit-scrollbar-thumb { background:var(--border); border-radius:2px; }
    </style>
</head>

// ── Build room HTML ────────────────────────────────────────────────────
function buildRoom(id, ag, status) {
    const m    = META[id] || { role: ag.name || id, icon:'◈', th:'analyst', lbl:'AGT' };
    const glow = GLOW[m.th] || '#00ffff';
    const walk = status === 'busy';
    return `
    <div class="rcard ${status}" id="room-${id}"
         style="--glow:${glow}" onclick="scrollToRoom('${id}')">
        <div class="rcard-hdr">
            <span class="rlabel">${m.icon} ${id.toUpperCase()}</span>
            <div class="rstatus">
                <div class="rring ${walk ? 'busy':''}"></div>
                <span>${walk ? 'BUSY':'IDLE'}</span>
            </div>
        </div>
        <div class="rint th-${m.th}" style="--glow:${glow}">
            ${(DECO[m.th] || DECO.analyst)()}
            <div class="rfloor" style="--glow:${glow}"></div>
            <div class="human ${walk ? 'walking':'idle'}" style="--glow:${glow}">
                <div class="hhead"></div>
                <div class="htorso"></div>
                <div class="hlegs">
                    <div class="hlegl"></div>
                    <div class="hlegr"></div>
                </div>
            </div>
        </div>
        <div class="rfoot">
            <div class="rfname">${ag.name || id}</div>
            <div class="rfmodel">${ag.model || 'llama3.1:8b'} · ${ag.provider || 'ollama-local'}</div>
            <div class="rflog ${walk ? 'live':''}">${walk ? '▶ task in corso...' : '— standby —'}</div>
            <div class="rfst"><span>${m.role}</span><span>${walk ? 'BUSY':'IDLE'}</span></div>
        </div>
    </div>`;
}

// ── Render ─────────────────────────────────────────────────────────────
function renderLeft(agents) {
    const entries = Object.entries(agents);
    document.getElementById('badge').textContent      = entries.length;
    document.getElementById('hdr-agents').textContent = entries.length;
    document.getElementById('alist').innerHTML        = entries.map(([id, ag]) => {
        const m = META[id] || { role: ag.name || id, icon:'◈' };
        return `<div class="aitem" onclick="scrollToRoom('${id}')">
            <div class="adot d-idle"></div>
            <div class="ainfo">
                <div class="aid">${id}</div>
                <div class="arole">${m.role}</div>
            </div>
        </div>`;
    }).join('');
}

function renderRooms(agents) {
    document.getElementById('rwrap').innerHTML =
        Object.entries(agents).map(([id, ag]) => buildRoom(id, ag, 'idle')).join('');
}

function scrollToRoom(id) {
    document.getElementById('room-' + id)?.scrollIntoView({ behavior:'smooth', block:'center' });
}

function showHelp() {
    alert('Apri il terminale SSH e lancia:\n\ndocker exec -it tinyagi npx tinyagi agent add');
}

// ── API ────────────────────────────────────────────────────────────────
function fmt(s) {
    s = Math.floor(s);
    return `${String(Math.floor(s/3600)).padStart(2,'0')}:${String(Math.floor(s%3600/60)).padStart(2,'0')}:${String(s%60).padStart(2,'0')}`;
}

async function fetchAgents() {
    const r = await fetch(`${API}/api/agents`);
    const d = await r.json();
    renderLeft(d); renderRooms(d);
}

async function fetchStatus() {
    const r = await fetch(`${API}/api/status`);
    const d = await r.json();
    if (d.uptime != null) document.getElementById('uptime').textContent = fmt(d.uptime);
}

let cd = 5;
async function refresh() {
    try { await Promise.all([fetchAgents(), fetchStatus()]); } catch(e) {}
    cd = 5;
}

setInterval(() => {
    cd--;
    document.getElementById('rtag').textContent = `↻ ${cd}s`;
    if (cd <= 0) refresh();
}, 1000);

refresh();
</script>
